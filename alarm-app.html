<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Clock App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .current-time {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .current-date {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .add-alarm-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .add-alarm-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .time-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .time-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .label-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .label-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .alarms-list {
            margin-top: 20px;
        }

        .alarms-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .alarm-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .alarm-item.active {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .alarm-item.inactive {
            opacity: 0.6;
        }

        .alarm-info {
            flex: 1;
        }

        .alarm-time {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .alarm-label {
            font-size: 14px;
            color: #666;
        }

        .alarm-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #4caf50;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(24px);
        }

        .btn-delete {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        .no-alarms {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 16px;
        }

        .alarm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .alarm-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: modalPop 0.3s ease-out;
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-time {
            font-size: 60px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
        }

        .modal-label {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-snooze, .btn-dismiss {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-snooze {
            background: #ff9800;
            color: white;
        }

        .btn-dismiss {
            background: #4caf50;
            color: white;
        }

        .btn-snooze:hover, .btn-dismiss:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .current-time {
                font-size: 36px;
            }

            .modal-time {
                font-size: 48px;
            }

            .alarm-time {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="current-time" id="currentTime">00:00:00</div>
            <div class="current-date" id="currentDate">Loading...</div>
        </div>

        <div class="content">
            <div class="add-alarm-section">
                <div class="add-alarm-title">⏰ Set New Alarm</div>
                <div class="time-input-group">
                    <input type="number" class="time-input" id="hoursInput" placeholder="Hours" min="0" max="23" value="07">
                    <input type="number" class="time-input" id="minutesInput" placeholder="Minutes" min="0" max="59" value="00">
                </div>
                <input type="text" class="label-input" id="labelInput" placeholder="Alarm label (optional)">
                <button class="btn-add" onclick="addAlarm()">Add Alarm</button>
            </div>

            <div class="alarms-list">
                <div class="alarms-title">Your Alarms</div>
                <div id="alarmsList"></div>
            </div>
        </div>
    </div>

    <div class="alarm-modal" id="alarmModal">
        <div class="modal-content">
            <div class="modal-time" id="modalTime">00:00</div>
            <div class="modal-label" id="modalLabel">Alarm</div>
            <div class="modal-buttons">
                <button class="btn-snooze" onclick="snoozeAlarm()">Snooze (5 min)</button>
                <button class="btn-dismiss" onclick="dismissAlarm()">Dismiss</button>
            </div>
        </div>
    </div>

    <audio id="alarmSound" loop>
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGnODyvmwhBSuBzvLZiTYHHmm98N+VRAsMUKfk7rheGgU7k9nyx3krBSl+zPLaizsIGGS51umkTgwOVKzn7bVeGgc9kdPxy3cqBSd8yO7aj0ALEV+y6OyoVBIMR53h8L9rIAUsgs/y24s4CBpqvvDem0YMDlKp5O22XhoFPJHY88p3KwUme8rx3I4+ChRftejqqFUUDEae4PG/bCAELIHO8tmJOAcear7w35tGDA5Sqefs t14aBjiP1vLKeisGJ3vK8NuQQAoTX7Xn66hVFAxGnt/wv2wgBSyBzvLZiTgIGmq+8N6cRgwOUqnk7bZeGgU8kNbzyncqBSZ7yvDcjj4KFF+16OuoVRQMRp7g8L9sIAUsgs/y2Yk4CBpqvvDfm0YMDlKp5+22XhoGOZDW88p3KgUme8rx3I4+ChNftejqqFUUDEad4PC/bCAFLIHO8tmJOQgbaL7w3ptFDA5Sqefs t14aBjiP1vPKeCsGJ3vK8NyOPwoUX7Xo66hUFAxGnt/xvmwfBSyBz/LZiTgIGmq+8N+bRQwOUajk7rZfGwc8kNb0yXYqBSd6y+/cjUALEV+16OupVhMNRp3f8b5rIAUsgs/y2Yo4BxtpvfDfm0YMDlKo5O+2XhsFOI/V8sp3KgYme8vw3I4/CxVftejrqFQVC0ad3/C/bB8GLIHPddiJOQgbaL7w35xFDA9Sqebu" type="audio/wav">
    </audio>

    <script>
        let alarms = JSON.parse(localStorage.getItem('alarms')) || [];
        let currentAlarmId = null;
        let alarmAudio = document.getElementById('alarmSound');
        let checkInterval;

        // Update current time
        function updateCurrentTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
        }

        // Add new alarm
        function addAlarm() {
            const hours = parseInt(document.getElementById('hoursInput').value);
            const minutes = parseInt(document.getElementById('minutesInput').value);
            const label = document.getElementById('labelInput').value || 'Alarm';

            if (isNaN(hours) || isNaN(minutes) || hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
                alert('Please enter valid time (Hours: 0-23, Minutes: 0-59)');
                return;
            }

            const alarm = {
                id: Date.now(),
                hours: hours,
                minutes: minutes,
                label: label,
                active: true
            };

            alarms.push(alarm);
            saveAlarms();
            renderAlarms();

            // Reset inputs
            document.getElementById('hoursInput').value = '07';
            document.getElementById('minutesInput').value = '00';
            document.getElementById('labelInput').value = '';
        }

        // Delete alarm
        function deleteAlarm(id) {
            alarms = alarms.filter(alarm => alarm.id !== id);
            saveAlarms();
            renderAlarms();
        }

        // Toggle alarm
        function toggleAlarm(id) {
            const alarm = alarms.find(a => a.id === id);
            if (alarm) {
                alarm.active = !alarm.active;
                saveAlarms();
                renderAlarms();
            }
        }

        // Render alarms list
        function renderAlarms() {
            const list = document.getElementById('alarmsList');

            if (alarms.length === 0) {
                list.innerHTML = '<div class="no-alarms">No alarms set. Add one above!</div>';
                return;
            }

            list.innerHTML = alarms
                .sort((a, b) => {
                    const aTime = a.hours * 60 + a.minutes;
                    const bTime = b.hours * 60 + b.minutes;
                    return aTime - bTime;
                })
                .map(alarm => {
                    const timeStr = `${String(alarm.hours).padStart(2, '0')}:${String(alarm.minutes).padStart(2, '0')}`;
                    return `
                        <div class="alarm-item ${alarm.active ? 'active' : 'inactive'}">
                            <div class="alarm-info">
                                <div class="alarm-time">${timeStr}</div>
                                <div class="alarm-label">${alarm.label}</div>
                            </div>
                            <div class="alarm-controls">
                                <div class="toggle-switch ${alarm.active ? 'active' : ''}" onclick="toggleAlarm(${alarm.id})">
                                    <div class="toggle-slider"></div>
                                </div>
                                <button class="btn-delete" onclick="deleteAlarm(${alarm.id})">Delete</button>
                            </div>
                        </div>
                    `;
                })
                .join('');
        }

        // Check alarms
        function checkAlarms() {
            const now = new Date();
            const currentHours = now.getHours();
            const currentMinutes = now.getMinutes();
            const currentSeconds = now.getSeconds();

            alarms.forEach(alarm => {
                if (alarm.active &&
                    alarm.hours === currentHours &&
                    alarm.minutes === currentMinutes &&
                    currentSeconds === 0) {
                    triggerAlarm(alarm);
                }
            });
        }

        // Trigger alarm
        function triggerAlarm(alarm) {
            currentAlarmId = alarm.id;
            const timeStr = `${String(alarm.hours).padStart(2, '0')}:${String(alarm.minutes).padStart(2, '0')}`;

            document.getElementById('modalTime').textContent = timeStr;
            document.getElementById('modalLabel').textContent = alarm.label;
            document.getElementById('alarmModal').classList.add('active');

            // Play alarm sound
            alarmAudio.play().catch(e => console.log('Audio play failed:', e));

            // Request notification permission and show notification
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Alarm!', {
                    body: `${timeStr} - ${alarm.label}`,
                    icon: '⏰',
                    requireInteraction: true
                });
            }
        }

        // Snooze alarm
        function snoozeAlarm() {
            if (currentAlarmId !== null) {
                const alarm = alarms.find(a => a.id === currentAlarmId);
                if (alarm) {
                    // Add 5 minutes to current time
                    const now = new Date();
                    now.setMinutes(now.getMinutes() + 5);
                    alarm.hours = now.getHours();
                    alarm.minutes = now.getMinutes();
                    saveAlarms();
                    renderAlarms();
                }
            }
            dismissAlarmModal();
        }

        // Dismiss alarm
        function dismissAlarm() {
            dismissAlarmModal();
        }

        // Dismiss alarm modal
        function dismissAlarmModal() {
            document.getElementById('alarmModal').classList.remove('active');
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            currentAlarmId = null;
        }

        // Save alarms to localStorage
        function saveAlarms() {
            localStorage.setItem('alarms', JSON.stringify(alarms));
        }

        // Request notification permission
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // Initialize
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
        checkInterval = setInterval(checkAlarms, 1000);
        renderAlarms();
        requestNotificationPermission();

        // Handle Enter key in inputs
        document.getElementById('hoursInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('minutesInput').focus();
        });

        document.getElementById('minutesInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('labelInput').focus();
        });

        document.getElementById('labelInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addAlarm();
        });
    </script>
</body>
</html>
